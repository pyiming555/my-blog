baseURL = "https://pyiming.pages.dev/" # 部署到 Cloudflare 后记得改成你实际的域名
languageCode = "zh-cn"
title = "pyiming 的博客"
theme = "PaperMod"

# 开启每篇文章的中文字数统计（对中文 SEO 非常重要）
hasCJKLanguage = true

[params]
    env = "production" # 开启生产环境，启用 SEO 元标签
    description = "pyiming 的个人博客，分享技术、算法学习与生活感悟"
    keywords = ["pyiming", "博客", "技术分享", "算法", "个人主页"]
    author = "pyiming"

    # 首页信息配置（Profile 模式）
    [params.homeInfoParams]
        Title = "欢迎来到 pyiming 的博客"
        Content = "这里是我的数字花园，记录我的学习笔记、代码实践和生活思考。很高兴你能来。"

    # 界面功能优化
    ShowReadingTime = true        # 显示阅读时间
    ShowShareButtons = true      # 显示社交分享按钮
    ShowCodeCopyButtons = true   # 开启代码块一键复制按钮
    ShowBreadCrumbs = true       # 开启面包屑导航（利于 SEO 结构）
    ShowFullTextContent = false  # 首页只显示摘要
    comments = false             # 默认关闭评论，以后可以加

    # SEO 社交链接配置
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/pyiming555"
    [[params.socialIcons]]
        name = "email"
        url = "mailto:pyiming555@gmail.com"

# 导航栏配置（全中文）
[menu]
    [[menu.main]]
        identifier = "posts"
        name = "文章"
        url = "/posts"
        weight = 10
    [[menu.main]]
        identifier = "archives"
        name = "归档"
        url = "/archives"
        weight = 20
    [[menu.main]]
        identifier = "tags"
        name = "标签"
        url = "/tags"
        weight = 30
    [[menu.main]]
        identifier = "search"
        name = "搜索"
        url = "/search"
        weight = 40

# 针对搜索引擎爬虫的优化
[markup]
    [markup.goldmark.renderer]
        unsafe = true # 允许在 Markdown 中使用 HTML
    [markup.tableOfContents]
        startLevel = 2
        endLevel = 4
        ordered = false

# 分类配置
[taxonomies]
    category = "categories"
    tag = "tags"
    series = "series"
    
    # 让首页额外输出一个 index.json 给搜索用
[outputs]
  home = ["HTML", "RSS", "JSON"]
